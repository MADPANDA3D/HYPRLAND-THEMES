# MADPANDA Dark Zen usability overrides.
# Generated from the Dark Zen theme package.
# Loaded at the end of ~/.config/hypr/hyprland.conf so these binds win over defaults.

env = XDG_PICTURES_DIR,@MAD_HOME@/Pictures
env = XDG_SCREENSHOTS_DIR,@MAD_HOME@/Pictures/Screenshots

# Launchers and settings.
unbind = $mainMod, Q
unbind = $mainMod, D
unbind = $mainMod, R
unbind = $mainMod, S
unbind = $mainMod SHIFT, S
unbind = $mainMod, T
unbind = $mainMod, A
unbind = $mainMod, O
unbind = $mainMod, SPACE
unbind = $mainMod, Z
unbind = $mainMod, W
unbind = $mainMod, TAB
unbind = $mainMod, I
unbind = $mainMod ALT, R
bind = $mainMod, Q, exec, kitty
bind = $mainMod, D, exec, dolphin
bind = $mainMod, SPACE, exec, pkill -x rofi || hyde-shell rofilaunch d
bind = $mainMod, A, hyprexpo:expo
bind = $mainMod, S, exec, @MAD_LOCAL_BIN@/mad-screenshot-active-window
bind = $mainMod SHIFT, S, exec, @MAD_LOCAL_BIN@/mad-screenshot-region
bind = $mainMod, T, togglespecialworkspace, magic
bind = $mainMod, Z, exec, code
bind = $mainMod, TAB, exec, pkill -x rofi || hyde-shell rofilaunch w
bind = $mainMod, I, exec, @MAD_LOCAL_BIN@/mad-settings-menu

# Session and rice controls.
unbind = $mainMod SHIFT, W
unbind = $mainMod SHIFT, T
unbind = $mainMod SHIFT, R
bind = $mainMod SHIFT, W, exec, pkill -x rofi || hyde-shell wallpaper -SG
bind = $mainMod SHIFT, T, exec, pkill -x rofi || @MAD_LOCAL_BIN@/mad-theme-safe select
bind = $mainMod SHIFT, R, exec, pkill -x rofi || hyde-shell wallbashtoggle -m

# Screen recording.
bind = $mainMod, R, exec, @MAD_LOCAL_BIN@/mad-record-active-monitor

# Dictation.
bind = $mainMod, W, exec, @MAD_LOCAL_BIN@/mad-dictate

unbind = CTRL ALT, 1
unbind = CTRL ALT, 2
unbind = CTRL ALT, 3
unbind = CTRL ALT, 4
bind = CTRL ALT, 1, exec, @MAD_LOCAL_BIN@/mad-theme-mode 1
bind = CTRL ALT, 2, exec, @MAD_LOCAL_BIN@/mad-theme-mode 2
bind = CTRL ALT, 3, exec, @MAD_LOCAL_BIN@/mad-theme-mode 3
bind = CTRL ALT, 4, exec, @MAD_LOCAL_BIN@/mad-theme-mode 4

# Display brightness uses Hyprland gamma only.
# This intentionally never calls ddcutil, brightnessctl, sysfs LEDs, or OpenRGB.
unbind = , XF86MonBrightnessUp
unbind = , XF86MonBrightnessDown
unbind = $mainMod, F12
unbind = $mainMod, F11
unbind = $mainMod SHIFT, F12
unbind = $mainMod SHIFT, F11
bindel = , XF86MonBrightnessUp, exec, @MAD_LOCAL_BIN@/mad-display-gamma inc 5
bindel = , XF86MonBrightnessDown, exec, @MAD_LOCAL_BIN@/mad-display-gamma dec 5
bindel = $mainMod, F12, exec, @MAD_LOCAL_BIN@/mad-display-gamma inc 5
bindel = $mainMod, F11, exec, @MAD_LOCAL_BIN@/mad-display-gamma dec 5
bind = $mainMod SHIFT, F12, exec, @MAD_LOCAL_BIN@/mad-display-gamma reset
bind = $mainMod SHIFT, F11, exec, @MAD_LOCAL_BIN@/mad-display-gamma popup

# Windows/workspaces.
dwindle {
    preserve_split = true
    smart_split = true
    use_active_for_splits = false
    force_split = 0
}

unbind = $mainMod CTRL, left
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, down
bind = $mainMod CTRL, left, workspace, r-1
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, down, workspace, empty

# NumPad workspace aliases. Shift can turn KP_1 into KP_End on many keyboards.
unbind = $mainMod, KP_1
unbind = $mainMod, KP_2
unbind = $mainMod, KP_3
unbind = $mainMod, KP_4
unbind = $mainMod, KP_5
unbind = $mainMod, KP_6
unbind = $mainMod, KP_7
unbind = $mainMod, KP_8
unbind = $mainMod, KP_9
unbind = $mainMod, KP_0
unbind = $mainMod, KP_End
unbind = $mainMod, KP_Down
unbind = $mainMod, KP_Next
unbind = $mainMod, KP_Left
unbind = $mainMod, KP_Begin
unbind = $mainMod, KP_Right
unbind = $mainMod, KP_Home
unbind = $mainMod, KP_Up
unbind = $mainMod, KP_Prior
unbind = $mainMod, KP_Insert
bind = $mainMod, KP_1, workspace, 1
bind = $mainMod, KP_2, workspace, 2
bind = $mainMod, KP_3, workspace, 3
bind = $mainMod, KP_4, workspace, 4
bind = $mainMod, KP_5, workspace, 5
bind = $mainMod, KP_6, workspace, 6
bind = $mainMod, KP_7, workspace, 7
bind = $mainMod, KP_8, workspace, 8
bind = $mainMod, KP_9, workspace, 9
bind = $mainMod, KP_0, workspace, 10
bind = $mainMod, KP_End, workspace, 1
bind = $mainMod, KP_Down, workspace, 2
bind = $mainMod, KP_Next, workspace, 3
bind = $mainMod, KP_Left, workspace, 4
bind = $mainMod, KP_Begin, workspace, 5
bind = $mainMod, KP_Right, workspace, 6
bind = $mainMod, KP_Home, workspace, 7
bind = $mainMod, KP_Up, workspace, 8
bind = $mainMod, KP_Prior, workspace, 9
bind = $mainMod, KP_Insert, workspace, 10

unbind = $mainMod SHIFT, KP_1
unbind = $mainMod SHIFT, KP_2
unbind = $mainMod SHIFT, KP_3
unbind = $mainMod SHIFT, KP_4
unbind = $mainMod SHIFT, KP_5
unbind = $mainMod SHIFT, KP_6
unbind = $mainMod SHIFT, KP_7
unbind = $mainMod SHIFT, KP_8
unbind = $mainMod SHIFT, KP_9
unbind = $mainMod SHIFT, KP_0
unbind = $mainMod SHIFT, KP_End
unbind = $mainMod SHIFT, KP_Down
unbind = $mainMod SHIFT, KP_Next
unbind = $mainMod SHIFT, KP_Left
unbind = $mainMod SHIFT, KP_Begin
unbind = $mainMod SHIFT, KP_Right
unbind = $mainMod SHIFT, KP_Home
unbind = $mainMod SHIFT, KP_Up
unbind = $mainMod SHIFT, KP_Prior
unbind = $mainMod SHIFT, KP_Insert
bind = $mainMod SHIFT, KP_1, movetoworkspace, 1
bind = $mainMod SHIFT, KP_2, movetoworkspace, 2
bind = $mainMod SHIFT, KP_3, movetoworkspace, 3
bind = $mainMod SHIFT, KP_4, movetoworkspace, 4
bind = $mainMod SHIFT, KP_5, movetoworkspace, 5
bind = $mainMod SHIFT, KP_6, movetoworkspace, 6
bind = $mainMod SHIFT, KP_7, movetoworkspace, 7
bind = $mainMod SHIFT, KP_8, movetoworkspace, 8
bind = $mainMod SHIFT, KP_9, movetoworkspace, 9
bind = $mainMod SHIFT, KP_0, movetoworkspace, 10
bind = $mainMod SHIFT, KP_End, movetoworkspace, 1
bind = $mainMod SHIFT, KP_Down, movetoworkspace, 2
bind = $mainMod SHIFT, KP_Next, movetoworkspace, 3
bind = $mainMod SHIFT, KP_Left, movetoworkspace, 4
bind = $mainMod SHIFT, KP_Begin, movetoworkspace, 5
bind = $mainMod SHIFT, KP_Right, movetoworkspace, 6
bind = $mainMod SHIFT, KP_Home, movetoworkspace, 7
bind = $mainMod SHIFT, KP_Up, movetoworkspace, 8
bind = $mainMod SHIFT, KP_Prior, movetoworkspace, 9
bind = $mainMod SHIFT, KP_Insert, movetoworkspace, 10

unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down
unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
unbind = $mainMod ALT, up
unbind = $mainMod ALT, down
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
binde = $mainMod ALT, left, resizeactive, -50 0
binde = $mainMod ALT, right, resizeactive, 50 0
binde = $mainMod ALT, up, resizeactive, 0 -50
binde = $mainMod ALT, down, resizeactive, 0 50

# Theme-owned MADPANDA daily shortcuts.
unbind = , Print
unbind = $mainMod, E
unbind = $mainMod, F
unbind = $mainMod, slash
unbind = $mainMod, X
bind = , Print, exec, @MAD_LOCAL_BIN@/mad-screenshot-full
bind = $mainMod, E, exec, @MAD_LOCAL_BIN@/mad-chrome-dark-zen
bind = $mainMod, F, exec, @MAD_LOCAL_BIN@/mad-keybinds-hint
bind = $mainMod, slash, exec, @MAD_LOCAL_BIN@/mad-keybinds-hint
bind = $mainMod, X, exec, @MAD_LOCAL_BIN@/mad-eww-widgets drawer-toggle

# Theme-owned session startup.
exec-once = @MAD_LOCAL_BIN@/mad-session-start

# Theme-owned lock screen.
unbind = $mainMod, L
bind = $mainMod, L, exec, @MAD_LOCAL_BIN@/mad-lock-session

# Theme-owned tile close effect.
unbind = $mainMod, C
bind = $mainMod, C, exec, @MAD_LOCAL_BIN@/mad-window-close
