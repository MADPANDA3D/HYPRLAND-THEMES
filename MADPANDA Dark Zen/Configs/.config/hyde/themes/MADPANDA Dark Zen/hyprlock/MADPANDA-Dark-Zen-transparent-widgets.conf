# MADPANDA Dark Zen transparent widget lock layout
# Used only by mad-lock-session after same-workspace tiles have been hidden.

$fontFamily = JetBrainsMono Nerd Font
$fn_greet=mad-lock-greet
$mad_lock_widget_art = $XDG_CACHE_HOME/madpanda/lock-widgets/media-art.png

general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
    immediate_render = true
}

animations {
    enabled = false
}

background {
    monitor =
    path =
    color = rgba(22, 24, 28, 0.35)
    blur_passes = 0
}

label {
    monitor =
    text = $TIME
    color = $wallbash_txt1_rgba
    font_size = 90
    font_family = $fontFamily
    position = 30, 0
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $wallbash_txt2_rgba
    font_size = 25
    font_family = $fontFamily
    position = 30, -150
    halign = left
    valign = top
}

shape {
    monitor =
    size = 760, 230
    color = rgba(121, 24, 29, 0.82)
    rounding = 28
    border_size = 1
    border_color = rgba(255, 255, 255, 0.18)
    rotate = 0
    xray = false
    position = -40, -54
    halign = right
    valign = top
    zindex = 2
}

image {
    monitor =
    path = $mad_lock_widget_art
    size = 166
    rounding = 24
    border_size = 1
    border_color = rgba(255, 255, 255, 0.24)
    rotate = 0
    reload_time = 0
    reload_cmd =
    position = -64, -86
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-source
    color = rgba(255, 255, 255, 0.64)
    font_size = 14
    font_family = $fontFamily
    position = -254, -76
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-title-1
    color = rgba(255, 255, 255, 0.92)
    font_size = 20
    font_family = $fontFamily Bold
    position = -254, -104
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-title-2
    color = rgba(255, 255, 255, 0.84)
    font_size = 18
    font_family = $fontFamily Bold
    position = -254, -130
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-title-3
    color = rgba(255, 255, 255, 0.78)
    font_size = 17
    font_family = $fontFamily Bold
    position = -254, -156
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-sub
    color = rgba(255, 255, 255, 0.68)
    font_size = 15
    font_family = $fontFamily
    position = -254, -188
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = ⏮
    color = rgba(255, 255, 255, 0.84)
    font_size = 28
    font_family = $fontFamily
    position = -610, -224
    halign = right
    valign = top
    onclick = playerctl previous
    zindex = 5
}

label {
    monitor =
    text = cmd[update:3000] mad-lock-widgets media-status-icon
    color = rgba(255, 255, 255, 0.92)
    font_size = 30
    font_family = $fontFamily Bold
    position = -500, -226
    halign = right
    valign = top
    onclick = playerctl play-pause
    zindex = 5
}

label {
    monitor =
    text = ⏭
    color = rgba(255, 255, 255, 0.84)
    font_size = 28
    font_family = $fontFamily
    position = -390, -224
    halign = right
    valign = top
    onclick = playerctl next
    zindex = 5
}

shape {
    monitor =
    size = 360, 128
    color = rgba(255, 255, 255, 0.86)
    rounding = 24
    border_size = 1
    border_color = rgba(121, 24, 29, 0.24)
    rotate = 0
    xray = false
    position = -40, -316
    halign = right
    valign = top
    zindex = 2
}

label {
    monitor =
    text = cmd[update:300000] mad-lock-widgets weather-icon
    color = rgba(121, 24, 29, 0.94)
    font_size = 52
    font_family = $fontFamily
    position = -314, -337
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:300000] mad-lock-widgets weather-main
    color = rgba(121, 24, 29, 0.94)
    font_size = 44
    font_family = $fontFamily Bold
    position = -158, -332
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:300000] mad-lock-widgets weather-sub
    color = rgba(121, 24, 29, 0.78)
    font_size = 17
    font_family = $fontFamily Bold
    position = -62, -390
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:300000] mad-lock-widgets weather-place
    color = rgba(121, 24, 29, 0.64)
    font_size = 14
    font_family = $fontFamily
    position = -62, -418
    halign = right
    valign = top
    zindex = 5
}

image {
    monitor =
    path = __MAD_DARK_ZEN_LOCK_AVATAR__
    size = 640
    reload_time = 0
    reload_cmd =
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $wallbash_pry4_rgba
    inner_color = $wallbash_pry2_rgba
    font_color = $wallbash_3xa9_rgba
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = $wallbash_pry4_rgba
    fail_color = rgba(FF0000FF)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = true
    position = 0, 8%
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] $fn_greet
    color = $text
    font_size = 40
    font_family = $fontFamily Bold
    position = 0, -31%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] mad-lock-quote "MADPANDA Dark Zen"
    color = $wallbash_txt2_rgba
    font_family = $fontFamily
    font_size = 15
    position = 0, 2.5%
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = $fontFamily
    position = -2%, 1%
    halign = right
    valign = bottom
}
