# MADPANDA Dark Zen lock layout
# Theme-owned variant of the HyDE default layout. Wallpaper remains dynamic,
# while the identity avatar is fixed by mad-theme-pack during apply.

$fontFamily = JetBrainsMono Nerd Font
$fn_greet=mad-lock-greet

general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
    immediate_render = true
}

animations {
    enabled = false
}

background {
    monitor =
    path = $BACKGROUND_PATH
    blur_passes = 2
}

label {
    monitor =
    text = $TIME
    color = $wallbash_txt1_rgba
    font_size = 90
    font_family = $fontFamily
    position = 30, 0
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $wallbash_txt2_rgba
    font_size = 25
    font_family = $fontFamily
    position = 30, -150
    halign = left
    valign = top
}

image {
    monitor =
    path = __MAD_DARK_ZEN_LOCK_AVATAR__
    size = 640
    reload_time = 0
    reload_cmd =
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $wallbash_pry4_rgba
    inner_color = $wallbash_pry2_rgba
    font_color = $wallbash_3xa9_rgba
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = $wallbash_pry4_rgba
    fail_color = rgba(FF0000FF)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = true
    position = 0, 8%
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] $fn_greet
    color = $text
    font_size = 40
    font_family = $fontFamily Bold
    position = 0, -31%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] mad-lock-quote "MADPANDA Dark Zen"
    color = $wallbash_txt2_rgba
    font_family = $fontFamily
    font_size = 15
    position = 0, 2.5%
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = $fontFamily
    position = -2%, 1%
    halign = right
    valign = bottom
}
