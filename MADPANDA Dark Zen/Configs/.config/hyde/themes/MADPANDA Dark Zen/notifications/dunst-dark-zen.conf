# MADPANDA Dark Zen Dunst style
# Rendered by mad-theme-pack into HyDE's Dunst wallbash source and cache.

[global]
width = 420
height = (0, 180)
origin = top-right
offset = (24,44)
notification_limit = 6
progress_bar = true
progress_bar_height = 7
progress_bar_frame_width = 0
progress_bar_min_width = 180
progress_bar_max_width = 390
progress_bar_corner_radius = 3
progress_bar_corners = all
indicate_hidden = yes
transparency = 0
separator_height = 0
padding = 12
horizontal_padding = 16
text_icon_padding = 14
frame_width = 2
gap_size = 8
separator_color = frame
sort = yes
line_height = 4
markup = full
format = "<span size='small' foreground='#E69A9A'>%a</span>\n<b>%s</b>\n<span foreground='#FFDADA'>%b</span>"
alignment = left
vertical_alignment = center
show_age_threshold = 60
ellipsize = middle
ignore_newline = no
show_indicators = yes
icon_position = left
min_icon_size = 72
max_icon_size = 96
corner_radius = 8
icon_corner_radius = 6

[dark_zen_hyde_identity]
appname = "^(HyDE Alert|HyDE Notify|MADPANDA|HyDE theme|Waybar layout)$"
new_icon = "__MAD_NOTIFICATION_ICON__"
format = "<span size='small' foreground='#E69A9A'>IMPERIAL RELAY :: %a</span>\n<b>%s</b>\n<span foreground='#FFDADA'>%b</span>"

[urgency_low]
background = "#07090CF0"
foreground = "#FFE6E6"
frame_color = "#8F5757"
highlight = "#EA0000"
icon = "__MAD_NOTIFICATION_ICON__"
timeout = 5

[urgency_normal]
background = "#050607F2"
foreground = "#FFE6E6"
frame_color = "#EA0000"
highlight = "#FF3B1F"
icon = "__MAD_NOTIFICATION_ICON__"
timeout = 5

[urgency_critical]
background = "#140202FA"
foreground = "#FFFFFF"
frame_color = "#FF3B1F"
highlight = "#FFB000"
icon = "__MAD_NOTIFICATION_ICON__"
timeout = 0
